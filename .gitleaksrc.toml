# Gitleaks configuration for Mnemosyne
# Extends the default gitleaks rules with local allowlist
# https://github.com/gitleaks/gitleaks

title = "Mnemosyne gitleaks config"

# Extend default rules (required — without this, custom config replaces all built-in rules)
[extend]
useDefault = true

# Global allowlist for known false positives
[allowlist]
  description = "Global allowlist"
  paths = [
    "docs/sync/tutorial\\.md",
    "docs/sync\\.md",
    "scripts/generate-docs\\.py",
  ]
